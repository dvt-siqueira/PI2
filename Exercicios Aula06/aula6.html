<html lang="pt-BR">

  <body>
    <h1>Bem-vindo à Aula 6</h1>
    <p>Este é um arquivo HTML de exemplo para os exercícios da aula 6.</p>
  </body>
  <script>
    // Aqui você pode adicionar seu código JavaScript para os exercícios da aula 6
    let contador = 5;
    while (contador >= 1) {
      console.log(`Contador: ${contador}`);
      contador--;
    }

    let i = 10;
    do{
      console.log(`Valor de i: ${i}`);
      i++;
    } while (i < 15);

    for (let i=0;i<5;i++){
      console.log(`Valor de i no for: ${i}`);
    }

    for (let i=0;i<=10;i++){
      if(i===5)continue;
      if (i===8)break;
      console.log(`Valor de i no for com break e continue: ${i}`);  
    }

  </script>
