<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Exemplo Visual</title>
  <style>
    body {
      font-family: Arial;
      background-color: #eeeeee;
      padding-top: 60px;
      text-align: center;
    }

    .card {
      width: 360px;
      margin: auto;
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card .conteudo {
      padding: 20px;
    }

    h1 {
      color: #0055aa;
    }

    .botoes {
      margin-top: 15px;
    }

    .btn-primario {
      padding: 10px 20px;
      border: none;
      background-color: #0055aa;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-secundario {
      padding: 10px 20px;
      border: none;
      background-color: #cccccc;
      color: #333;
      border-radius: 6px;
      cursor: pointer;
      margin-left: 10px;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="https://picsum.photos/600/300" alt="Imagem de exemplo">

    <div class="conteudo">
      <h1>Programação Web</h1>
      <p>Desafio de HTML e CSS</p>

      <div class="botoes">
        <button class="btn-primario">Entrar</button>
        <button class="btn-secundario">Cancelar</button>
      </div>
    </div>
  </div>

</body>
</html>
