<script>
  let nota1 = 8,
    nota2 = 6,
    frequencia = 80;
  let media = (nota1 + nota2) / 2;

  if (media >= 7 && frequencia >= 75) {
    console.log(`Média ${media}: Aprovado!`);
  } else if (media >= 5 && frequencia >= 75) {
    console.log(`Média ${media}: Recuperação.`);
  } else {
    console.log("Reprovado.");
  }

  let codigoPedido = 4;

  switch (codigoPedido) {
    case 1:
      console.log("Hambúrguer - R$ 15,00");
      break;
    case 2:
      console.log("Batata Frita - R$ 10,00");
      break;
    case 3:
      console.log("Refrigerante - R$ 5,00");
      break;
    case 4:
      console.log("Combo - R$ 25,00");
      break;
    default:
      console.log("Código inválido");
  }

  for (let i = 1; i <= 30; i++) {
    if (i % 3 === 0 && i % 5 === 0) {
      console.log("FizzBuzz");
    } else if (i % 3 === 0) {
      console.log("Fizz");
    } else if (i % 5 === 0) {
      console.log("Buzz");
    } else {
      console.log(i);
    }
  }

  
</script>
